# Example Compose stack: copy to docker-compose.yml and adjust paths/secrets.
#   cp examples/config.example.yaml config.yaml
#   # create aws_credentials.ini (INI shared-credentials format) — do not commit secrets
#
#   docker compose -f docker-compose.example.yml pull
#   docker compose -f docker-compose.example.yml up

secrets:
  aws_credentials:
    file: ./aws_credentials.ini

services:
  route53-ddns:
    image: ghcr.io/borzilleri/route53_ddns:latest
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      # CONFIG_FILE defaults to /config.yaml in the image; override only if needed.
      # Compose mounts the secret below to /run/secrets/aws_credentials by default.
      AWS_SHARED_CREDENTIALS_FILE: /run/secrets/aws_credentials
      AWS_DEFAULT_REGION: us-east-1
    secrets:
      - aws_credentials
    volumes:
      - ./config.yaml:/config.yaml:ro
